name: rvv_analyzer
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  archive: ^4.0.9
  csv: ^8.0.0
  path_provider: ^2.1.5
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  flutter_gen_runner: ^5.14.1

flutter_gen:
  output: lib/core
  line_length: 80

  integrations:
    flutter_svg: true

  assets:
    enabled: true
    outputs:
      class_name: Assets
      package_parameter_enabled: false

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/gtfs/stops.txt
    - assets/gtfs/stop_times.txt
    - assets/gtfs/trips.txt
    - assets/gtfs/routes.txt
    - assets/gtfs/shapes.txt
    - assets/weather/weather_regensburg_all.csv
    - assets/rec/october_2024.csv
