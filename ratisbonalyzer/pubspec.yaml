name: ratisbonalyzer
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_svg: ^2.0.10+1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  csv: ^6.0.0
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  http: ^1.2.2
  audioplayers: ^6.0.0

  vector_graphics: any
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  path_provider: ^2.1.5
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.11
  flutter_gen_runner: ^5.6.0

flutter_gen:
  output: lib/src/core
  line_length: 80

  integrations:
    flutter_svg: true

  assets:
    enabled: true
    outputs:
      class_name: Assets
      package_parameter_enabled: false

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/gtfs/
    - assets/img/
    - assets/rec/
    - assets/weather/
    - assets/sounds/
